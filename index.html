<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil – Grace Lavanya</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #e8ecff, #f7f9ff);
            font-family: "Poppins", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            animation: fadeIn 1.2s ease;
        }

        h1 {
            font-size: 3.2rem;
            color: #2a4bd7;
            margin-bottom: 10px;
            font-weight: 700;
        }

        h1 a {
            color: #2a4bd7;
            text-decoration: none;
            transition: 0.3s;
        }

        h1 a:hover {
            color: #1a2f9c;
        }

        p {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 25px;
        }

        .enter-btn {
            font-size: 1.3rem;
            color: #2a4bd7;
            text-decoration: none;
            font-weight: 600;
            border: 2px solid #2a4bd7;
            padding: 12px 28px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .enter-btn:hover {
            background: #2a4bd7;
            color: white;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1><a href="portfolio_v1.html">Grace Lavanya</a></h1>
        <p>Mon Portfolio</p>
        <a class="enter-btn" href="portfolio_v1.html">Entrer</a>
    </div>
</body>
</html>
